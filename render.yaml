services:
  - type: web
    name: daily-stock-analysis
    runtime: docker
    plan: free
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    dockerCommand: python main.py --serve-only --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEBUI_HOST
        value: 0.0.0.0
      - key: WEBUI_AUTO_BUILD
        value: "false"
